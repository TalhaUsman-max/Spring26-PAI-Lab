<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>University Admission Assistant</title>

<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.chat-app {
    width: 420px;
    height: 650px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}

/* Header */
.chat-header {
    padding: 16px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(45deg, #4f46e5, #06b6d4);
}

.header-text h2 {
    margin: 0;
    font-size: 16px;
    color: white;
}

.header-text p {
    margin: 0;
    font-size: 12px;
    color: #cbd5e1;
}

/* Messages */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    animation: fadeIn 0.2s ease;
}

.user {
    align-self: flex-end;
    background: #4f46e5;
    color: white;
    border-bottom-right-radius: 4px;
}

.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.12);
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
}

/* Input */
.chat-input {
    display: flex;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    gap: 10px;
}

.chat-input input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.chat-input button {
    background: #4f46e5;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.chat-input button:hover {
    background: #4338ca;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="chat-app">

    <!-- Header -->
    <div class="chat-header">
        <div class="avatar"></div>
        <div class="header-text">
            <h2>Admission Assistant</h2>
            <p>Ask anything about university admissions</p>
        </div>
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chatbox">

        <div class="message bot">
            👋 Hi! I can help you with admissions, fees, programs, and deadlines.
        </div>

    </div>

    <!-- Input -->
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your question...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function sendMessage() {

    let input = document.getElementById("userInput");
    let text = input.value.trim();
    if (!text) return;

    let chatbox = document.getElementById("chatbox");

    // user message
    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = text;
    chatbox.appendChild(userMsg);

    input.value = "";

    // bot loading
    let botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = "Typing...";
    chatbox.appendChild(botMsg);

    chatbox.scrollTop = chatbox.scrollHeight;

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "msg=" + encodeURIComponent(text)
    })
    .then(res => res.json())
    .then(data => {
        botMsg.innerText = data.reply;
        chatbox.scrollTop = chatbox.scrollHeight;
    })
    .catch(() => {
        botMsg.innerText = "Error: Try again later.";
    });
}

// Enter key support
document.getElementById("userInput").addEventListener("keypress", function(e){
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
