<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face Profiling AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
}

/* Animated Background */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Main Card */
.container{
    width:450px;
    padding:40px;
    border-radius:25px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
    animation: fadeIn 1s ease;
}

/* Title */
h1{
    font-size:24px;
    margin-bottom:20px;
    font-weight:600;
    letter-spacing:1px;
}

/* File Input */
input[type="file"]{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:white;
    cursor:pointer;
    margin-bottom:15px;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    background: linear-gradient(90deg,#ff512f,#dd2476);
    color:white;
    transition:0.3s ease;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Result Section */
#profile{
    margin-top:15px;
    font-size:15px;
    font-weight:400;
}

/* Image */
img{
    margin-top:15px;
    width:100%;
    border-radius:15px;
    display:none;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Loader */
.loader{
    border:4px solid rgba(255,255,255,0.3);
    border-top:4px solid white;
    border-radius:50%;
    width:30px;
    height:30px;
    animation: spin 1s linear infinite;
    margin:15px auto;
    display:none;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>
<body>

<div class="container">
<h1>🔍 AI Face Profiling System</h1>

<input type="file" id="imageInput" accept="image/*">
<button onclick="uploadImage()">Upload & Detect</button>

<div class="loader" id="loader"></div>

<div id="profile"></div>
<img id="resultImage">

</div>

<script>

async function uploadImage(){

    const input = document.getElementById("imageInput");

    if(input.files.length === 0){
        alert("Please select an image!");
        return;
    }

    const loader = document.getElementById("loader");
    const profile = document.getElementById("profile");
    const img = document.getElementById("resultImage");

    loader.style.display = "block";
    profile.innerHTML = "";
    img.style.display = "none";

    const formData = new FormData();
    formData.append("image", input.files[0]);

    try{
        const response = await fetch("/upload",{
            method:"POST",
            body:formData
        });

        const data = await response.json();

        loader.style.display = "none";

        if(data.error){
            profile.innerHTML = data.error;
            return;
        }

        profile.innerHTML = "✅ " + data.profile;

        img.src = data.image + "?t=" + new Date().getTime();
        img.style.display = "block";

    }catch(error){
        loader.style.display = "none";
        profile.innerHTML = "❌ Error detecting face.";
    }
}

</script>

</body>
</html>
